[Settings]
; ==============================
; 全局基础开关
; ==============================
open_update = True
; 总开关：开启直播源抓取、测速、更新功能，必须开启

open_unmatch_category = True
; 保留未匹配分类链接：模板内的内网/组播IP，即使云端测速失败也保留
; 本地同运营商网络可正常播放，外网自动使用公网源，兼顾内外网使用

open_empty_category = False
; 关闭空频道分组：没有有效链接的频道不单独展示，界面更整洁

open_update_time = True
; 在结果文件底部添加更新时间，方便判断源是否为最新

open_url_info = False
; 【DIYP 关键设置】关闭链接后 $ 附带的分辨率、来源等信息
; DIYP 无法正常解析该类后缀，开启会直接导致播放失败

open_epg = True
; 开启EPG节目单生成，会输出 epg.xml 文件，DIYP 可加载电视节目预告

open_m3u_result = True
; 同时生成 m3u 格式文件作为备用，DIYP 优先使用 txt 格式

urls_limit = 3
; 单个频道最多保留3条最优播放源，源数量适中，DIYP 自动换源体验更好

update_time_position = bottom
; 更新时间展示位置：bottom=文件底部，top=文件顶部

language = zh_CN
; 软件语言：简体中文

; ==============================
; 本地定时配置（GitHub 以线上定时为准）
; ==============================
update_mode = interval
; 定时模式：interval=按时间间隔执行，time=按固定时间点执行

update_interval = 12
; 本地更新间隔：12小时执行一次，和线上早晚两次更新逻辑匹配

update_times =
; 固定时间点执行，当前模式不生效，留空即可

update_startup = True
; 程序启动后立刻执行一次更新，保证首次使用拿到最新源

time_zone = Asia/Shanghai
; 时区：北京时间东八区，保证更新时间、EPG时间准确

; ==============================
; 文件输出 & 服务配置
; ==============================
source_file = config/demo.txt
; 频道分类模板文件，DIYP 依靠该文件实现央视/卫视/影视等分组

final_file = output/result.txt
; 【DIYP 主用文件】最终直播源输出路径，DIYP 填写此文件直链

open_realtime_write = True
; 测速过程中实时写入文件，无需等待全部任务跑完即可使用

open_service = False
; 关闭本地网页服务，云端运行无需此功能，减少占用

app_port = 5180
; 网页服务端口，功能已关闭，无需修改

public_scheme = http
; 公网访问协议

public_domain = 127.0.0.1
; 本地回环地址，默认即可

cdn_url =
; CDN加速地址，国内正常使用留空

http_proxy =
; 网络代理，无代理则留空

; ==============================
; 数据源总开关
; ==============================
open_local = True
; 开启本地源 local.txt，可手动添加私有自用源

open_subscribe = True
; 开启订阅源（主力数据源），90%频道来自订阅源，必须开启

open_auto_disable_source = False
; 关闭自动禁用失效订阅源，防止优质源被程序误屏蔽

; ==============================
; 数据源附加规则
; ==============================
open_history = True
; 启用历史缓存：合并上一次更新的有效源，避免单次更新结果为空

open_headers = False
; 关闭M3U请求头验证，DIYP 不需要该功能

; ==============================
; 测速 & 质量过滤（筛选高清、低卡顿源）
; ==============================
open_speed_test = True
; 开启测速功能：检测延迟、码率、分辨率，剔除卡顿/失效源

open_filter_resolution = True
; 开启分辨率过滤，过滤模糊低清源

open_filter_speed = True
; 开启速率过滤，过滤低网速卡顿源

open_full_speed_test = False
; 关闭全量测速：单个频道凑够3条有效源就停止，提升运行速度

open_supply = False
; 关闭补偿机制：源充足时，不强行保留劣质链接

min_resolution = 1280x720
; 最低分辨率：720P，低于该标准的源直接过滤

max_resolution = 3840x2160
; 最高分辨率：4K，不限制高清上限

min_speed = 0.5
; 最低播放速率 0.5M/s，低于该速度判定为卡顿源

resolution_speed_map = 1280x720:0.2,1920x1080:0.5,3840x2160:1.0
; 不同分辨率对应最低码率规则，平衡清晰度与流畅度

speed_test_limit = 6
; 并发测速数量：6个，兼顾云端运行稳定性和测速速度

speed_test_timeout = 8
; 单链接测速超时8秒，超时判定为失效/内网无法访问

speed_test_filter_host = False
; 关闭同主机共享测速数据，保证测速结果精准

request_timeout = 8
; 网络请求总超时8秒，加快整体更新效率

; ==============================
; 网络协议 & 地域/运营商过滤（DIYP盒子通用）
; ==============================
ipv6_support = False
; 关闭IPv6检测，国内绝大多数电视盒子、智能电视不支持IPv6

ipv_type = ipv4
; 最终结果仅输出 IPv4 链接，全设备兼容，DIYP 播放最稳定

ipv_type_prefer = ipv4
; 协议优先级：优先使用IPv4

location = 
; 仅保留内地源，过滤海外、港澳台链接

isp = 
; 仅保留国内三大运营商，过滤小众运营商源

; ==============================
; 源优先级排序（稳定优先）
; 顺序：订阅源 > 酒店源 > 组播 > 全网搜索 > FOFA
; ==============================
origin_type_prefer = subscribe,hotel,multicast,online_search,fofa

; ==============================
; 本地源、订阅源数量限制
; ==============================
local_num = 10
; 本地源最大展示数量

subscribe_num = 10
; 订阅源最大展示数量

; ==============================
; 频道台标配置（DIYP 支持展示台标）
; ==============================
logo_url = https://www.xn--rgv465a.top/tvlogo
; 台标库地址，DIYP 开启台标后加载图片

logo_type = png
; 台标图片格式

; ==============================
; RTMP 推流（DIYP 完全用不到，全部关闭）
; ==============================
open_rtmp = False
; 关闭RTMP本地推流功能

nginx_http_port = 8080
; 推流相关端口，功能关闭无需修改

nginx_rtmp_port = 1935
; 推流相关端口，功能关闭无需修改

rtmp_idle_timeout = 300
; 空闲停止推流时长，无效

rtmp_max_streams = 10
; 最大并发推流数，无效

rtmp_transcode_mode = copy
; 推流转码模式，功能关闭保留默认即可
